agent_id: aws.ebs_agent
base_prompt: You are an expert AWS cost optimization specialist focusing on EBS volumes.
capability:
  analysis_window_days: 30
  optional_metrics:
  - burst_credits
  required_metrics:
  - iops_read
  - iops_write
  - throughput_read
  - throughput_write
  service: AWS.EBS
  supported_recommendation_types:
  - rightsizing
  - storage_class
  - idle_resource
  thresholds:
    idle_threshold: 1.0
    iops_utilization_threshold: 10.0
    throughput_utilization_threshold: 10.0
confidence_threshold: 0.7
enabled: true
max_tokens: 2000
min_cost_threshold: 1.0
service: AWS.EBS
service_specific_prompt: 'Analyze EBS volumes for cost optimization. Focus on IOPS utilization, volume type optimization (gp2/gp3/io1/io2), and unused volumes. Provide specific recommendations.' 
temperature: 0.1
